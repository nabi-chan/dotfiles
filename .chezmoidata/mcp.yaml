mcp_servers:
  connector-database:
    type: stdio
    command: mise
    args:
      - x
      - npm:@bytebase/dbhub
      - --
      - dbhub
      - --transport
      - stdio
      - --config
      - ~/.config/dbhub/dbhub.toml
  documentation-shadcn:
    type: stdio
    command: mise
    args:
      - x
      - npm:shadcn
      - --
      - shadcn
      - mcp
  tools-chrome:
    type: stdio
    command: mise
    args:
      - x
      - npm:chrome-devtools-mcp
      - --
      - chrome-devtools-mcp
      - --autoConnect
  tools-pyhub-mcptools:
    type: stdio
    command: pyhub.mcptools
    args:
      - run
      - stdio
